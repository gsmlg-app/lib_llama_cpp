group = "com.gsmlg.libllamacpp.android"
version = "1.0"

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.11.1")
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"

def prebuiltJniLibsDir = file("src/main/jniLibs")
def hasPrebuiltJniLibs = prebuiltJniLibsDir.exists() &&
    fileTree(prebuiltJniLibsDir).matching { include "**/*.so" }.files.size() > 0

// Allow Vulkan to be toggled via gradle property or environment variable.
// Default: ON (most modern Android devices support Vulkan).
def enableVulkan = project.findProperty("lib_llama_cpp.enable_vulkan")
    ?: System.getenv("LIB_LLAMA_CPP_ENABLE_VULKAN")
    ?: "ON"

android {
    namespace = "com.gsmlg.libllamacpp.android"
    compileSdk = 36
    ndkVersion = android.ndkVersion

    sourceSets {
        main {
            jniLibs.srcDirs = ["src/main/jniLibs"]
        }
    }

    if (!hasPrebuiltJniLibs) {
        externalNativeBuild {
            cmake {
                path = "../src/CMakeLists.txt"
            }
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        minSdk = 24

        if (!hasPrebuiltJniLibs) {
            externalNativeBuild {
                cmake {
                    arguments "-DLIB_LLAMA_CPP_ENABLE_VULKAN=${enableVulkan}"
                    // 16KB page alignment for Android 16+ compatibility.
                    cFlags "-D__ANDROID_UNAVAILABLE_SYMBOLS_ARE_WEAK__"
                    cppFlags "-D__ANDROID_UNAVAILABLE_SYMBOLS_ARE_WEAK__"
                }
            }
            ndk {
                abiFilters "arm64-v8a", "x86_64"
            }
        }
    }
}
