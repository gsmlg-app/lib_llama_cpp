group = "com.gsmlg.libllamacpp.android"
version = "1.0"

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.11.1")
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"

def prebuiltJniLibsDir = file("src/main/jniLibs")
def hasPrebuiltJniLibs = prebuiltJniLibsDir.exists() &&
    fileTree(prebuiltJniLibsDir).matching { include "**/*.so" }.files.size() > 0

// Allow Vulkan to be toggled via gradle property or environment variable.
// Default: OFF for source builds and packaged CPU prebuilts.
// Set to ON if the Vulkan SDK is installed locally.
def enableVulkan = project.findProperty("lib_llama_cpp.enable_vulkan")
    ?: System.getenv("LIB_LLAMA_CPP_ENABLE_VULKAN")
    ?: "OFF"
def sourceVulkanEnabled = enableVulkan.toString().equalsIgnoreCase("ON")
def vulkanEnabled = sourceVulkanEnabled
def minSdkVersion = vulkanEnabled ? 28 : 24
def androidAbis = (System.getenv("ANDROID_ABIS")
    ?: System.getenv("ANDROID_ABI")
    ?: "arm64-v8a x86_64")
    .split(/[,\s]+/)
    .findAll { it }
def androidApiLevel = (System.getenv("ANDROID_PLATFORM") ?: "android-${minSdkVersion}")
    .replaceFirst(/^android-/, "")
def cmakeArguments = ["-DLIB_LLAMA_CPP_ENABLE_VULKAN=${enableVulkan}"]

if (sourceVulkanEnabled && System.getenv("VULKAN_SDK")) {
    cmakeArguments.add("-DVulkan_INCLUDE_DIR=${System.getenv("VULKAN_SDK")}/include")
    cmakeArguments.add("-DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH")
    cmakeArguments.add("-DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH")

    def vulkanAbi = androidAbis.size() == 1 ? androidAbis[0] : null
    def vulkanTriples = [
        "arm64-v8a": "aarch64-linux-android",
        "armeabi-v7a": "arm-linux-androideabi",
        "x86_64": "x86_64-linux-android",
        "x86": "i686-linux-android",
    ]
    def ndkHome = System.getenv("ANDROID_NDK_HOME") ?: System.getenv("ANDROID_NDK_ROOT")
    if (ndkHome && vulkanAbi && vulkanTriples.containsKey(vulkanAbi)) {
        def vulkanLibrary = fileTree("${ndkHome}/toolchains/llvm/prebuilt")
            .matching {
                include "**/sysroot/usr/lib/${vulkanTriples[vulkanAbi]}/${androidApiLevel}/libvulkan.so"
            }
            .files
            .find()
        if (vulkanLibrary) {
            cmakeArguments.add("-DVulkan_LIBRARY=${vulkanLibrary.absolutePath}")
        }
    }
}

android {
    namespace = "com.gsmlg.libllamacpp.android"
    compileSdk = 36
    ndkVersion = android.ndkVersion

    sourceSets {
        main {
            jniLibs.srcDirs = ["src/main/jniLibs"]
        }
    }

    if (!hasPrebuiltJniLibs) {
        externalNativeBuild {
            cmake {
                path = "../src/CMakeLists.txt"
            }
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        minSdk = minSdkVersion

        if (!hasPrebuiltJniLibs) {
            externalNativeBuild {
                cmake {
                    arguments(*cmakeArguments)
                    // 16KB page alignment for Android 16+ compatibility.
                    cFlags "-D__ANDROID_UNAVAILABLE_SYMBOLS_ARE_WEAK__"
                    cppFlags "-D__ANDROID_UNAVAILABLE_SYMBOLS_ARE_WEAK__"
                }
            }
            ndk {
                abiFilters(*androidAbis)
            }
        }
    }
}
