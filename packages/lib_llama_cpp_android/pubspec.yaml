name: lib_llama_cpp_android
description: Android native build and Dart registration for lib_llama_cpp.
version: 0.5.4
repository: https://github.com/gsmlg-app/lib_llama_cpp

environment:
  sdk: ^3.11.5
  flutter: '>=3.41.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  lib_llama_cpp_platform_interface: ^0.5.4

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: lib_llama_cpp
    platforms:
      android:
        dartPluginClass: LibLlamaCppAndroid
        ffiPlugin: true
