name: lib_llama_cpp_linux
description: Linux native build and Dart registration for lib_llama_cpp.
version: 0.7.0
repository: https://github.com/gsmlg-app/lib_llama_cpp

environment:
  sdk: ^3.11.5
  flutter: '>=3.41.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  lib_llama_cpp_platform_interface: ^0.7.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  test: ^1.26.3

flutter:
  plugin:
    implements: lib_llama_cpp
    platforms:
      linux:
        dartPluginClass: LibLlamaCppLinux
        ffiPlugin: true
