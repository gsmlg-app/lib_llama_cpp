name: lib_llama_cpp_workspace
publish_to: none

environment:
  sdk: ^3.11.5

workspace:
  - packages/lib_llama_cpp
  - packages/lib_llama_cpp_platform_interface
  - packages/lib_llama_cpp_ffi
  - packages/lib_llama_cpp_server
  - packages/lib_llama_cpp_android
  - packages/lib_llama_cpp_ios
  - packages/lib_llama_cpp_macos
  - packages/lib_llama_cpp_linux
  - packages/lib_llama_cpp_windows
  - example

dev_dependencies:
  flutter_lints: ^6.0.0
  melos: ^7.3.0

melos:
  command:
    bootstrap:
      usePubspecOverrides: true

  scripts:
    analyze:
      run: >
        melos exec --concurrency=4 --dir-exists=lib --
        "if grep -q \"sdk: flutter\" pubspec.yaml; then
          flutter analyze;
        else
          dart analyze .;
        fi"

    test:
      run: >
        melos exec --concurrency=4 --dir-exists=test --
        "if grep -q \"flutter_test:\" pubspec.yaml; then
          flutter test;
        else
          dart test;
        fi"

    flutter_test:
      run: melos exec --concurrency=2 --depends-on=flutter_test -- flutter test

    ffigen:
      run: >
        melos exec --concurrency=1 --scope=lib_llama_cpp_ffi --
        dart run ffigen --config ffigen.yaml

    format:
      run: melos exec --concurrency=4 -- dart format .
