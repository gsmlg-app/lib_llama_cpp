name: First publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to first publish
        required: true
        default: lib_llama_cpp_server
        type: choice
        options:
          - lib_llama_cpp_server
      git_ref:
        description: Git ref to publish from
        required: true
        default: main
        type: string
      dry_run:
        description: Validate without publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.package }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.41.7'

jobs:
  publish:
    name: First publish ${{ inputs.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve package
        id: package
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail
          case "$PACKAGE" in
            lib_llama_cpp_server)
              package_dir="packages/lib_llama_cpp_server"
              ;;
            *)
              echo "::error::Unsupported first-publish package: ${PACKAGE}"
              exit 1
              ;;
          esac

          if [[ ! -f "${package_dir}/pubspec.yaml" ]]; then
            echo "::error::Missing ${package_dir}/pubspec.yaml"
            exit 1
          fi

          if grep -Eq '^publish_to:\s*none\s*$' "${package_dir}/pubspec.yaml"; then
            echo "::error::${PACKAGE} is marked publish_to: none"
            exit 1
          fi

          version="$(awk '/^version:/ { print $2; exit }' "${package_dir}/pubspec.yaml")"
          echo "package_dir=${package_dir}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check package is unpublished
        id: published
        env:
          PACKAGE: ${{ inputs.package }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          status="$(
            curl -sS -o "$RUNNER_TEMP/package.json" \
              -w '%{http_code}' \
              "https://pub.dev/api/packages/${PACKAGE}"
          )"

          if [[ "$status" == "404" ]]; then
            echo "${PACKAGE} is not published yet."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$status" != "200" ]]; then
            echo "::error::pub.dev returned HTTP ${status} for ${PACKAGE}"
            cat "$RUNNER_TEMP/package.json"
            exit 1
          fi

          published="$(
            VERSION="$VERSION" python3 -c 'import json, os, sys; print("yes" if any(item["version"] == os.environ["VERSION"] for item in json.load(open(sys.argv[1])).get("versions", [])) else "no")' "$RUNNER_TEMP/package.json"
          )"
          if [[ "$published" == "yes" ]]; then
            echo "${PACKAGE} ${VERSION} is already published; skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::${PACKAGE} already exists on pub.dev. Use the regular publish workflow for new versions."
          exit 1

      - name: Validate package
        if: ${{ steps.published.outputs.should_publish == 'true' }}
        working-directory: ${{ steps.package.outputs.package_dir }}
        run: flutter pub publish --dry-run --ignore-warnings

      - name: Configure pub credentials
        if: ${{ steps.published.outputs.should_publish == 'true' && inputs.dry_run != true }}
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          set -euo pipefail
          if [[ -z "${PUB_CREDENTIALS}" ]]; then
            {
              echo "## First publish requires user credentials"
              echo
              echo "pub.dev only allows automated publishing for existing packages."
              echo "Create the package with user-backed pub credentials first, then the regular publish workflow can use OIDC for later versions."
              echo
              echo "Set repository secret \`PUB_CREDENTIALS\` from a local \`~/.pub-cache/credentials.json\`, rerun this workflow, then remove the secret after the first publish."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Missing PUB_CREDENTIALS secret. pub.dev rejects OIDC for brand-new packages."
            exit 1
          fi

          pub_cache="${PUB_CACHE:-$HOME/.pub-cache}"
          mkdir -p "$pub_cache"
          printf '%s' "$PUB_CREDENTIALS" > "$pub_cache/credentials.json"
          chmod 0600 "$pub_cache/credentials.json"

      - name: Publish package
        if: ${{ steps.published.outputs.should_publish == 'true' && inputs.dry_run != true }}
        working-directory: ${{ steps.package.outputs.package_dir }}
        run: flutter pub publish --force
