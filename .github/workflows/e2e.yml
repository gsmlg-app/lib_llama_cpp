name: End-to-End

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to run
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
          - macos
          - linux
          - windows

env:
  MODEL_URL: https://huggingface.co/QuantFactory/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct.Q4_0.gguf?download=true
  MODEL_SHA256: f68203bfb98b1b1e8c64fac75fab10c4e36acac081609573b4df0fcc19c90dd9
  GEMMA4_E2B_MODEL_URL: https://huggingface.co/batiai/Gemma-4-E2B-it-GGUF/resolve/main/google-gemma-4-E2B-it-Q4_K_M.gguf
  GEMMA4_E2B_MODEL_SHA256: e6d47b7c6316612da747c4e471d10f5f1b87c8bf6051332d80f4810d69196c64
  GEMMA4_E2B_MMPROJ_URL: https://huggingface.co/batiai/Gemma-4-E2B-it-GGUF/resolve/main/mmproj-BF16.gguf
  GEMMA4_E2B_MMPROJ_SHA256: e8b6533e68c0e2b18c57e1cb570ded27a0d70f3421745125bdb210bf5cd4f1c6
  SMOKE_PROMPT: Say hello in one short sentence.
  SMOKE_TOKENS: '4'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.platform || 'all' }}
  cancel-in-progress: true

jobs:
  internal-request-regressions:
    name: Internal request regressions
    if: ${{ (inputs.platform || 'all') == 'all' || (inputs.platform || 'all') == 'linux' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install Dart and Flutter dependencies
        run: dart pub get

      - name: Run JSON helper and package metadata tests
        run: |
          dart test packages/lib_llama_cpp/test/openai_json_helpers_test.dart -r expanded
          dart test packages/lib_llama_cpp/test/package_metadata_test.dart -r expanded

      - name: Run typed multimodal/tool API smoke tests
        run: |
          dart test packages/lib_llama_cpp/test/multimodal_tool_api_test.dart -r expanded
          dart test packages/lib_llama_cpp/test/tool_call_fallback_test.dart -r expanded

  real-model-smoke:
    name: Real model smoke (${{ matrix.platform }})
    if: ${{ (inputs.platform || 'all') == 'all' || (inputs.platform || 'all') == 'linux' || (inputs.platform || 'all') == 'macos' || (inputs.platform || 'all') == 'windows' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON((inputs.platform || 'all') == 'all' && '[{"platform":"linux","os":"ubuntu-latest"},{"platform":"macos","os":"macos-14"},{"platform":"windows","os":"windows-2022"}]' || (inputs.platform || 'all') == 'linux' && '[{"platform":"linux","os":"ubuntu-latest"}]' || (inputs.platform || 'all') == 'macos' && '[{"platform":"macos","os":"macos-14"}]' || (inputs.platform || 'all') == 'windows' && '[{"platform":"windows","os":"windows-2022"}]' || '[]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install Linux llama.cpp build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake glslc libgtk-3-dev liblzma-dev libvulkan-dev mesa-vulkan-drivers ninja-build pkg-config spirv-headers vulkan-tools xvfb
          if [[ -f /usr/share/vulkan/icd.d/lvp_icd.x86_64.json ]]; then
            echo "VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json" >> "$GITHUB_ENV"
          fi
          echo "LIBGL_ALWAYS_SOFTWARE=1" >> "$GITHUB_ENV"
          echo "GGML_VK_VISIBLE_DEVICES=0" >> "$GITHUB_ENV"
          vulkaninfo --summary || true

      - name: Build llama.cpp CLI
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S third_party/llama.cpp -B build/llama-cpp \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF \
            -DGGML_ACCELERATE=OFF \
            -DGGML_BLAS=OFF \
            -DGGML_METAL=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_BUILD_WEBUI=OFF \
            -DLLAMA_OPENSSL=OFF
          cmake --build build/llama-cpp --target llama-cli --parallel 2

      - name: Build llama.cpp CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S third_party/llama.cpp -B build/llama-cpp `
            -A x64 `
            -DGGML_NATIVE=OFF `
            -DGGML_ACCELERATE=OFF `
            -DGGML_BLAS=OFF `
            -DGGML_METAL=OFF `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_TOOLS=ON `
            -DLLAMA_BUILD_WEBUI=OFF `
            -DLLAMA_OPENSSL=OFF
          cmake --build build/llama-cpp --config Release --target llama-cli --parallel 2

      - name: Download and verify GGUF model
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/models"
          model_path="$RUNNER_TEMP/models/SmolLM2-135M-Instruct.Q4_0.gguf"
          curl -L --fail --retry 3 --retry-delay 10 "$MODEL_URL" -o "$model_path"
          if command -v sha256sum >/dev/null 2>&1; then
            echo "$MODEL_SHA256  $model_path" | sha256sum -c -
          else
            echo "$MODEL_SHA256  $model_path" | shasum -a 256 -c -
          fi
          echo "MODEL_PATH=$model_path" >> "$GITHUB_ENV"

      - name: Download and verify GGUF model
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:RUNNER_TEMP "models"
          New-Item -ItemType Directory -Force -Path $modelDir | Out-Null
          $modelPath = Join-Path $modelDir "SmolLM2-135M-Instruct.Q4_0.gguf"
          curl.exe -L --fail --retry 3 --retry-delay 10 $env:MODEL_URL -o $modelPath
          $actual = (Get-FileHash -Algorithm SHA256 $modelPath).Hash.ToLowerInvariant()
          if ($actual -ne $env:MODEL_SHA256) {
            Write-Error "Model SHA256 mismatch. Expected $env:MODEL_SHA256, got $actual"
            exit 1
          }
          "MODEL_PATH=$modelPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Dart and Flutter dependencies
        run: dart pub get

      - name: Enable Flutter desktop target
        run: flutter config --enable-${{ matrix.platform }}-desktop

      - name: Run example E2E harness
        if: runner.os != 'Windows'
        shell: bash
        timeout-minutes: 30
        run: |
          set -euo pipefail
          cd example
          model_define=(--dart-define=LIB_LLAMA_CPP_TEST_MODEL="$MODEL_PATH")
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            mkdir -p assets/e2e
            cp "$MODEL_PATH" assets/e2e/model.gguf
            model_define=(
              --dart-define=LIB_LLAMA_CPP_TEST_MODEL_ASSET=assets/e2e/model.gguf
            )
          fi
          harness_command=(
            flutter test
            "${model_define[@]}"
            --dart-define=LIB_LLAMA_CPP_TEST_PROMPT="$SMOKE_PROMPT"
            --dart-define=LIB_LLAMA_CPP_TEST_TOKENS="$SMOKE_TOKENS"
            --dart-define=LIB_LLAMA_CPP_TEST_BACKEND=cpu
            --dart-define=LIB_LLAMA_CPP_TEST_GPU_LAYERS=0
            integration_test/e2e_harness_test.dart
            -d "${{ matrix.platform }}"
          )
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            xvfb-run -a "${harness_command[@]}"
          else
            "${harness_command[@]}"
          fi

      - name: Run example E2E harness
        if: runner.os == 'Windows'
        shell: pwsh
        timeout-minutes: 30
        run: |
          cd example
          $defines = @(
            "--dart-define=LIB_LLAMA_CPP_TEST_MODEL=$env:MODEL_PATH",
            "--dart-define=LIB_LLAMA_CPP_TEST_PROMPT=$env:SMOKE_PROMPT",
            "--dart-define=LIB_LLAMA_CPP_TEST_TOKENS=$env:SMOKE_TOKENS",
            "--dart-define=LIB_LLAMA_CPP_TEST_BACKEND=cpu",
            "--dart-define=LIB_LLAMA_CPP_TEST_GPU_LAYERS=0"
          )
          flutter test @defines integration_test/e2e_harness_test.dart -d windows

      - name: Build native API library
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            LIB_LLAMA_CPP_ENABLE_METAL=OFF \
              LIB_LLAMA_CPP_PREBUILD_BUILD_DIR="$RUNNER_TEMP/prebuilt-build-cpu" \
              bash .github/scripts/build-native-prebuilt.sh macos "$RUNNER_TEMP/prebuilt-cpu"
            cpu_library="$(find "$RUNNER_TEMP/prebuilt-cpu/macos/lib_llama_cpp_macos.xcframework" -type f -name lib_llama_cpp_macos | head -n 1)"
            test -n "$cpu_library"
            echo "LIB_LLAMA_CPP_TEST_CPU_LIBRARY=$cpu_library" >> "$GITHUB_ENV"

            LIB_LLAMA_CPP_ENABLE_METAL=ON \
              LIB_LLAMA_CPP_PREBUILD_BUILD_DIR="$RUNNER_TEMP/prebuilt-build-metal" \
              bash .github/scripts/build-native-prebuilt.sh macos "$RUNNER_TEMP/prebuilt-metal"
            metal_library="$(find "$RUNNER_TEMP/prebuilt-metal/macos/lib_llama_cpp_macos.xcframework" -type f -name lib_llama_cpp_macos | head -n 1)"
            test -n "$metal_library"
            echo "LIB_LLAMA_CPP_TEST_METAL_LIBRARY=$metal_library" >> "$GITHUB_ENV"
          else
            LIB_LLAMA_CPP_ENABLE_VULKAN=OFF \
              LIB_LLAMA_CPP_PREBUILD_BUILD_DIR="$RUNNER_TEMP/prebuilt-build-cpu" \
              bash .github/scripts/build-native-prebuilt.sh linux "$RUNNER_TEMP/prebuilt-cpu"
            cpu_library="$RUNNER_TEMP/prebuilt-cpu/linux/x64/liblib_llama_cpp_linux.so"
            test -f "$cpu_library"
            echo "LIB_LLAMA_CPP_TEST_CPU_LIBRARY=$cpu_library" >> "$GITHUB_ENV"

            LIB_LLAMA_CPP_ENABLE_VULKAN=ON \
              LIB_LLAMA_CPP_PREBUILD_BUILD_DIR="$RUNNER_TEMP/prebuilt-build-vulkan" \
              bash .github/scripts/build-native-prebuilt.sh linux "$RUNNER_TEMP/prebuilt-vulkan"
            vulkan_library="$RUNNER_TEMP/prebuilt-vulkan/linux/x64/liblib_llama_cpp_linux.so"
            test -f "$vulkan_library"
            echo "LIB_LLAMA_CPP_TEST_VULKAN_LIBRARY=$vulkan_library" >> "$GITHUB_ENV"
          fi

      - name: Build native API library
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .github/scripts/build-native-prebuilt.ps1 -Platform windows -OutputDir "$env:RUNNER_TEMP\prebuilt"
          $libraryPath = Join-Path $env:RUNNER_TEMP "prebuilt\windows\x64\lib_llama_cpp_windows.dll"
          if (!(Test-Path $libraryPath)) {
            Write-Error "Could not find $libraryPath"
            exit 1
          }
          "LIB_LLAMA_CPP_TEST_LIBRARY=$libraryPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run API tool-use smoke
        if: runner.os != 'Windows'
        shell: bash
        timeout-minutes: 10
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            LIB_LLAMA_CPP_TEST_LIBRARY="$LIB_LLAMA_CPP_TEST_CPU_LIBRARY" \
              LIB_LLAMA_CPP_TEST_MODEL="$MODEL_PATH" \
              LIB_LLAMA_CPP_TEST_BACKEND=cpu \
              LIB_LLAMA_CPP_TEST_GPU_LAYERS=0 \
              dart test packages/lib_llama_cpp/test/real_model_tool_smoke_test.dart -r expanded

            LIB_LLAMA_CPP_TEST_LIBRARY="$LIB_LLAMA_CPP_TEST_METAL_LIBRARY" \
              LIB_LLAMA_CPP_TEST_MODEL="$MODEL_PATH" \
              LIB_LLAMA_CPP_TEST_BACKEND=metal \
              LIB_LLAMA_CPP_TEST_GPU_LAYERS=32 \
              dart test packages/lib_llama_cpp/test/real_model_tool_smoke_test.dart -r expanded
          else
            LIB_LLAMA_CPP_TEST_LIBRARY="$LIB_LLAMA_CPP_TEST_CPU_LIBRARY" \
              LIB_LLAMA_CPP_TEST_MODEL="$MODEL_PATH" \
              LIB_LLAMA_CPP_TEST_BACKEND=cpu \
              LIB_LLAMA_CPP_TEST_GPU_LAYERS=0 \
              dart test packages/lib_llama_cpp/test/real_model_tool_smoke_test.dart -r expanded

            LIB_LLAMA_CPP_TEST_LIBRARY="$LIB_LLAMA_CPP_TEST_VULKAN_LIBRARY" \
              LIB_LLAMA_CPP_TEST_MODEL="$MODEL_PATH" \
              LIB_LLAMA_CPP_TEST_BACKEND=vulkan \
              LIB_LLAMA_CPP_TEST_GPU_LAYERS=32 \
              dart test packages/lib_llama_cpp/test/real_model_tool_smoke_test.dart -r expanded
          fi

      - name: Run API tool-use smoke
        if: runner.os == 'Windows'
        shell: pwsh
        timeout-minutes: 10
        run: |
          $env:LIB_LLAMA_CPP_TEST_MODEL = $env:MODEL_PATH
          $env:LIB_LLAMA_CPP_TEST_BACKEND = "cpu"
          $env:LIB_LLAMA_CPP_TEST_GPU_LAYERS = "0"
          dart test packages/lib_llama_cpp/test/real_model_tool_smoke_test.dart -r expanded

      - name: Run real model inference
        if: runner.os != 'Windows'
        shell: bash
        timeout-minutes: 5
        run: |
          llama_cli="$(find build/llama-cpp/bin -type f -name llama-cli -perm -111 2>/dev/null | head -n 1)"
          if [[ -z "$llama_cli" ]]; then
            llama_cli="$(find build/llama-cpp -type f -name llama-cli -perm -111 | head -n 1)"
          fi
          if [[ -z "$llama_cli" ]]; then
            echo "Could not find llama-cli executable."
            find build/llama-cpp -maxdepth 4 -type f | sort
            exit 1
          fi
          "$llama_cli" \
            -m "$MODEL_PATH" \
            -p "$SMOKE_PROMPT" \
            -n 8 \
            --temp 0 \
            --single-turn \
            2>&1 | tee "$RUNNER_TEMP/llama-output.txt"
          grep -Eq 'Generation:' "$RUNNER_TEMP/llama-output.txt"

      - name: Run real model inference
        if: runner.os == 'Windows'
        shell: pwsh
        timeout-minutes: 5
        run: |
          $binDir = Join-Path "build/llama-cpp" "bin"
          $cli = Get-ChildItem -Path $binDir -Recurse -Filter llama-cli.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $cli) {
            $cli = Get-ChildItem -Path build/llama-cpp -Recurse -Filter llama-cli.exe | Select-Object -First 1
          }
          if ($null -eq $cli) {
            Get-ChildItem -Path build/llama-cpp -Recurse -File | Select-Object -ExpandProperty FullName
            Write-Error "Could not find llama-cli.exe."
            exit 1
          }
          $output = & $cli.FullName `
            -m $env:MODEL_PATH `
            -p $env:SMOKE_PROMPT `
            -n 8 `
            --temp 0 `
            --single-turn 2>&1
          $output | Tee-Object -FilePath "$env:RUNNER_TEMP\llama-output.txt"
          $outputText = $output -join "`n"
          if ($outputText -notmatch "Generation:") {
            Write-Error "Model output did not contain llama.cpp generation timing."
            exit 1
          }

  gemma4-e2b-api-e2e:
    name: Gemma 4 E2B API E2E (linux)
    if: ${{ (inputs.platform || 'all') == 'all' || (inputs.platform || 'all') == 'linux' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install Dart dependencies
        run: dart pub get

      - name: Build Linux native library
        shell: bash
        run: |
          bash .github/scripts/build-native-prebuilt.sh linux "$RUNNER_TEMP/prebuilt"
          library_path="$RUNNER_TEMP/prebuilt/linux/x64/liblib_llama_cpp_linux.so"
          test -f "$library_path"
          echo "LIB_LLAMA_CPP_TEST_LIBRARY=$library_path" >> "$GITHUB_ENV"

      - name: Download and verify Gemma 4 E2B model and projector
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/models"
          model_path="$RUNNER_TEMP/models/google-gemma-4-E2B-it-Q4_K_M.gguf"
          mmproj_path="$RUNNER_TEMP/models/mmproj-BF16.gguf"
          curl -L --fail --retry 3 --retry-delay 10 "$GEMMA4_E2B_MODEL_URL" -o "$model_path"
          curl -L --fail --retry 3 --retry-delay 10 "$GEMMA4_E2B_MMPROJ_URL" -o "$mmproj_path"
          echo "$GEMMA4_E2B_MODEL_SHA256  $model_path" | sha256sum -c -
          echo "$GEMMA4_E2B_MMPROJ_SHA256  $mmproj_path" | sha256sum -c -
          echo "LIB_LLAMA_CPP_TEST_MODEL=$model_path" >> "$GITHUB_ENV"
          echo "LIB_LLAMA_CPP_TEST_MMPROJ=$mmproj_path" >> "$GITHUB_ENV"

      - name: Run Gemma 4 E2B multimodal and tool E2E
        timeout-minutes: 45
        run: dart test packages/lib_llama_cpp/test/real_model_e2e_test.dart -r expanded

      - name: Run Gemma 4 E2B server API E2E
        timeout-minutes: 20
        run: |
          LIB_LLAMA_CPP_TEST_MODEL_ALIAS=gemma4-e2b \
            dart test packages/lib_llama_cpp_server/test/native_server_e2e_test.dart -r expanded

  android-real-model-smoke:
    name: Real model smoke (android)
    if: ${{ (inputs.platform || 'all') == 'all' || (inputs.platform || 'all') == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      ANDROID_ABI: x86_64
      ANDROID_PLATFORM: android-28
      LIB_LLAMA_CPP_ENABLE_VULKAN: ON
      LIB_LLAMA_CPP_TEST_BACKEND: vulkan
      LIB_LLAMA_CPP_TEST_GPU_LAYERS: '1'
      LIB_LLAMA_CPP_EXAMPLE_TEST_BACKEND: cpu
      LIB_LLAMA_CPP_EXAMPLE_TEST_GPU_LAYERS: '0'
      LIB_LLAMA_CPP_TEST_MODEL: /data/local/tmp/lib_llama_cpp_e2e/model.gguf
      GGML_VK_VISIBLE_DEVICES: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable Linux KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Linux Android build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake glslc libvulkan-dev mesa-vulkan-drivers ninja-build spirv-headers vulkan-tools
          mkdir -p "$RUNNER_TEMP/vulkan-host-headers/include"
          ln -sfn /usr/include/vulkan "$RUNNER_TEMP/vulkan-host-headers/include/vulkan"
          ln -sfn /usr/include/spirv "$RUNNER_TEMP/vulkan-host-headers/include/spirv"
          echo "VULKAN_SDK=$RUNNER_TEMP/vulkan-host-headers" >> "$GITHUB_ENV"
          echo "LIBGL_ALWAYS_SOFTWARE=1" >> "$GITHUB_ENV"
          if [[ -f /usr/share/vulkan/icd.d/lvp_icd.x86_64.json ]]; then
            echo "VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json" >> "$GITHUB_ENV"
          fi
          vulkaninfo --summary || true
          vulkaninfo 2>/dev/null | grep -E 'storageBuffer16BitAccess|uniformAndStorageBuffer16BitAccess' || true

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "cmake;3.22.1" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Build Android llama.cpp CLI
        shell: bash
        run: bash .github/scripts/build-android-llama-cli.sh

      - name: Install Dart and Flutter dependencies
        run: dart pub get

      - name: Download and verify GGUF model
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/models"
          model_path="$RUNNER_TEMP/models/SmolLM2-135M-Instruct.Q4_0.gguf"
          curl -L --fail --retry 3 --retry-delay 10 "$MODEL_URL" -o "$model_path"
          if command -v sha256sum >/dev/null 2>&1; then
            echo "$MODEL_SHA256  $model_path" | sha256sum -c -
          else
            echo "$MODEL_SHA256  $model_path" | shasum -a 256 -c -
          fi
          echo "MODEL_PATH=$model_path" >> "$GITHUB_ENV"

      - name: Run Android Vulkan and example E2E harness
        timeout-minutes: 65
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: default
          arch: x86_64
          profile: pixel_2
          cores: 2
          ram-size: 2048M
          heap-size: 512
          pre-emulator-launch-script: mkdir -p "$HOME/.android" && printf "Vulkan = on\nGLDirectMem = on\n" > "$HOME/.android/advancedFeatures.ini"
          emulator-options: -no-window -gpu lavapipe -no-snapshot -noaudio -no-boot-anim -no-metrics -feature Vulkan,GLDirectMem
          emulator-boot-timeout: 1200
          disable-linux-hw-accel: false
          disable-animations: true
          script: bash .github/scripts/android-real-model-smoke.sh

  ios-real-model-smoke:
    name: Real model smoke (ios)
    if: ${{ (inputs.platform || 'all') == 'all' || (inputs.platform || 'all') == 'ios' }}
    runs-on: macos-14
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: false

      - name: Build iOS simulator llama.cpp CLI
        shell: bash
        run: bash .github/scripts/build-ios-sim-llama-cli.sh

      - name: Install Dart and Flutter dependencies
        run: dart pub get

      - name: Download and verify GGUF model
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/models"
          model_path="$RUNNER_TEMP/models/SmolLM2-135M-Instruct.Q4_0.gguf"
          curl -L --fail --retry 3 --retry-delay 10 "$MODEL_URL" -o "$model_path"
          if command -v sha256sum >/dev/null 2>&1; then
            echo "$MODEL_SHA256  $model_path" | sha256sum -c -
          else
            echo "$MODEL_SHA256  $model_path" | shasum -a 256 -c -
          fi
          echo "MODEL_PATH=$model_path" >> "$GITHUB_ENV"

      - name: Boot iOS simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && /Shutdown/ {print $2; exit}')"
          if [[ -z "$device_id" ]]; then
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl boot "$device_id"
          xcrun simctl bootstatus "$device_id" -b
          echo "IOS_SIMULATOR_ID=$device_id" >> "$GITHUB_ENV"

      - name: Run iOS native real model smoke
        timeout-minutes: 5
        shell: bash
        run: bash .github/scripts/ios-real-model-smoke.sh

      - name: Run iOS plugin-backed integration smoke
        timeout-minutes: 25
        shell: bash
        run: |
          cd example
          mkdir -p assets/e2e
          cp "$MODEL_PATH" assets/e2e/model.gguf
          flutter test \
            --dart-define=LIB_LLAMA_CPP_TEST_MODEL_ASSET=assets/e2e/model.gguf \
            --dart-define=LIB_LLAMA_CPP_TEST_PROMPT="$SMOKE_PROMPT" \
            --dart-define=LIB_LLAMA_CPP_TEST_TOKENS="$SMOKE_TOKENS" \
            --dart-define=LIB_LLAMA_CPP_TEST_BACKEND=cpu \
            --dart-define=LIB_LLAMA_CPP_TEST_GPU_LAYERS=0 \
            integration_test/e2e_harness_test.dart \
            -d "$IOS_SIMULATOR_ID"

  flutter-platform-builds:
    name: Flutter platform build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON((inputs.platform || 'all') == 'all' && '[{"platform":"android","os":"ubuntu-latest","command":"flutter build apk --debug"},{"platform":"ios","os":"macos-14","command":"flutter build ios --debug --simulator --no-codesign"},{"platform":"linux","os":"ubuntu-latest","command":"flutter build linux --debug"},{"platform":"macos","os":"macos-14","command":"flutter build macos --debug"},{"platform":"windows","os":"windows-2022","command":"flutter build windows --debug"}]' || (inputs.platform || 'all') == 'android' && '[{"platform":"android","os":"ubuntu-latest","command":"flutter build apk --debug"}]' || (inputs.platform || 'all') == 'ios' && '[{"platform":"ios","os":"macos-14","command":"flutter build ios --debug --simulator --no-codesign"}]' || (inputs.platform || 'all') == 'linux' && '[{"platform":"linux","os":"ubuntu-latest","command":"flutter build linux --debug"}]' || (inputs.platform || 'all') == 'macos' && '[{"platform":"macos","os":"macos-14","command":"flutter build macos --debug"}]' || (inputs.platform || 'all') == 'windows' && '[{"platform":"windows","os":"windows-2022","command":"flutter build windows --debug"}]' || '[]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux desktop build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev liblzma-dev ninja-build pkg-config

      - name: Install Android Vulkan plugin build dependencies
        if: matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake glslc libvulkan-dev ninja-build spirv-headers
          mkdir -p "$RUNNER_TEMP/vulkan-host-headers/include"
          ln -sfn /usr/include/vulkan "$RUNNER_TEMP/vulkan-host-headers/include/vulkan"
          ln -sfn /usr/include/spirv "$RUNNER_TEMP/vulkan-host-headers/include/spirv"
          echo "VULKAN_SDK=$RUNNER_TEMP/vulkan-host-headers" >> "$GITHUB_ENV"
          echo "LIB_LLAMA_CPP_ENABLE_VULKAN=ON" >> "$GITHUB_ENV"
          echo "ANDROID_PLATFORM=android-28" >> "$GITHUB_ENV"
          echo "ANDROID_ABIS=x86_64" >> "$GITHUB_ENV"

      - name: Setup Java for Android
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-${{ matrix.platform }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-pub-

      - name: Install Dart and Flutter dependencies
        run: dart pub get

      - name: Install Android SDK packages
        if: matrix.platform == 'android'
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "cmake;3.22.1" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Enable desktop target
        if: matrix.platform == 'linux' || matrix.platform == 'macos' || matrix.platform == 'windows'
        run: flutter config --enable-${{ matrix.platform }}-desktop

      - name: Build Flutter example for ${{ matrix.platform }}
        working-directory: example
        run: ${{ matrix.command }}
