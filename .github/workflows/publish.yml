name: Publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version or tag to publish (e.g. 0.3.1 or v0.3.1)
        required: true
        type: string
      git_ref:
        description: Git ref to publish from
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.7'
  PUBLISH_TAG: ${{ inputs.version || github.ref_name }}
  PUBLISH_REF: ${{ inputs.git_ref || github.ref }}

jobs:
  publish-foundation:
    name: Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: lib_llama_cpp_platform_interface
            working-directory: packages/lib_llama_cpp_platform_interface
          - package: lib_llama_cpp_ffi
            working-directory: packages/lib_llama_cpp_ffi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_REF }}

      - name: Setup Dart OIDC credentials
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Publish ${{ matrix.package }}
        working-directory: ${{ matrix.working-directory }}
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          set -euo pipefail
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          published="$(
            curl -fsSL "https://pub.dev/api/packages/${PACKAGE}" |
              VERSION="$version" python3 -c 'import json, os, sys; print("yes" if any(item["version"] == os.environ["VERSION"] for item in json.load(sys.stdin).get("versions", [])) else "no")'
          )"
          if [[ "$published" == "yes" ]]; then
            echo "${PACKAGE} ${version} is already published; skipping"
            exit 0
          fi
          if ! flutter pub publish --force 2>&1 | tee publish.log; then
            if grep -Eiq 'already (published|exists)|version .* already' publish.log; then
              echo "${PACKAGE} ${version} is already published; treating as success"
              exit 0
            fi
            exit 1
          fi

  wait-for-facade:
    name: Wait for lib_llama_cpp
    runs-on: ubuntu-latest
    needs:
      - publish-facade
    timeout-minutes: 12

    steps:
      - name: Wait for pub.dev indexing
        env:
          PACKAGE: lib_llama_cpp
        run: |
          set -euo pipefail
          version="${PUBLISH_TAG#v}"
          echo "Waiting for ${PACKAGE} ${version} on pub.dev"
          for attempt in {1..40}; do
            latest="$(
              curl -fsSL "https://pub.dev/api/packages/${PACKAGE}" |
                python3 -c 'import json, sys; print(json.load(sys.stdin)["latest"]["version"])'
            )"
            if [[ "$latest" == "$version" ]]; then
              echo "${PACKAGE} ${version} is indexed"
              break
            fi
            if [[ "$attempt" == "40" ]]; then
              echo "::error::${PACKAGE} latest version is ${latest}, expected ${version}"
              exit 1
            fi
            sleep 15
          done

  fresh-pub-build-smoke:
    name: Fresh pub.dev build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs:
      - wait-for-facade
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            build-command: flutter build linux --debug
          - platform: macos
            os: macos-14
            build-command: flutter build macos --debug
          - platform: windows
            os: windows-2022
            build-command: flutter build windows --debug

    steps:
      - name: Install Linux desktop build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev liblzma-dev ninja-build pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build fresh app from pub.dev package
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ env.PUBLISH_TAG }}
          BUILD_COMMAND: ${{ matrix.build-command }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          app_dir="$RUNNER_TEMP/lib_llama_cpp_pub_smoke"
          flutter config --enable-${PLATFORM}-desktop
          rm -rf "$app_dir"
          flutter create --platforms="$PLATFORM" "$app_dir"
          cd "$app_dir"
          for attempt in {1..40}; do
            if flutter pub add "lib_llama_cpp:${version}"; then
              break
            fi
            if [[ "$attempt" == "40" ]]; then
              echo "::error::lib_llama_cpp ${version} is not resolvable from pub.dev"
              exit 1
            fi
            echo "Waiting for lib_llama_cpp ${version} to become resolvable from pub.dev (attempt ${attempt}/40)."
            sleep 15
          done
          $BUILD_COMMAND

  wait-for-foundation:
    name: Wait for foundation packages
    runs-on: ubuntu-latest
    needs:
      - publish-foundation
    timeout-minutes: 12

    steps:
      - name: Wait for pub.dev indexing
        env:
          PACKAGES: lib_llama_cpp_platform_interface lib_llama_cpp_ffi
        run: |
          set -euo pipefail
          version="${PUBLISH_TAG#v}"
          for package in $PACKAGES; do
            echo "Waiting for ${package} ${version} on pub.dev"
            for attempt in {1..40}; do
              latest="$(
                curl -fsSL "https://pub.dev/api/packages/${package}" |
                  python3 -c 'import json, sys; print(json.load(sys.stdin)["latest"]["version"])'
              )"
              if [[ "$latest" == "$version" ]]; then
                echo "${package} ${version} is indexed"
                break
              fi
              if [[ "$attempt" == "40" ]]; then
                echo "::error::${package} latest version is ${latest}, expected ${version}"
                exit 1
              fi
              sleep 15
            done
          done

  publish-platforms:
    name: Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs:
      - wait-for-foundation
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: lib_llama_cpp_android
            working-directory: packages/lib_llama_cpp_android
          - package: lib_llama_cpp_ios
            working-directory: packages/lib_llama_cpp_ios
          - package: lib_llama_cpp_macos
            working-directory: packages/lib_llama_cpp_macos
          - package: lib_llama_cpp_linux
            working-directory: packages/lib_llama_cpp_linux
          - package: lib_llama_cpp_windows
            working-directory: packages/lib_llama_cpp_windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_REF }}

      - name: Setup Dart OIDC credentials
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Download native prebuilts from GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/download-release-prebuilts.sh "${PUBLISH_TAG#v}" "$RUNNER_TEMP/prebuilt"

      - name: Install prebuilts into platform packages
        run: .github/scripts/install-prebuilt-packages.sh "$RUNNER_TEMP/prebuilt"

      - name: Publish ${{ matrix.package }}
        working-directory: ${{ matrix.working-directory }}
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          set -euo pipefail
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          published="$(
            curl -fsSL "https://pub.dev/api/packages/${PACKAGE}" |
              VERSION="$version" python3 -c 'import json, os, sys; print("yes" if any(item["version"] == os.environ["VERSION"] for item in json.load(sys.stdin).get("versions", [])) else "no")'
          )"
          if [[ "$published" == "yes" ]]; then
            echo "${PACKAGE} ${version} is already published; skipping"
            exit 0
          fi
          if ! flutter pub publish --force 2>&1 | tee publish.log; then
            if grep -Eiq 'already (published|exists)|version .* already' publish.log; then
              echo "${PACKAGE} ${version} is already published; treating as success"
              exit 0
            fi
            exit 1
          fi

  wait-for-platforms:
    name: Wait for platform packages
    runs-on: ubuntu-latest
    needs:
      - publish-platforms
    timeout-minutes: 12

    steps:
      - name: Wait for pub.dev indexing
        env:
          PACKAGES: lib_llama_cpp_android lib_llama_cpp_ios lib_llama_cpp_macos lib_llama_cpp_linux lib_llama_cpp_windows
        run: |
          set -euo pipefail
          version="${PUBLISH_TAG#v}"
          for package in $PACKAGES; do
            echo "Waiting for ${package} ${version} on pub.dev"
            for attempt in {1..40}; do
              latest="$(
                curl -fsSL "https://pub.dev/api/packages/${package}" |
                  python3 -c 'import json, sys; print(json.load(sys.stdin)["latest"]["version"])'
              )"
              if [[ "$latest" == "$version" ]]; then
                echo "${package} ${version} is indexed"
                break
              fi
              if [[ "$attempt" == "40" ]]; then
                echo "::error::${package} latest version is ${latest}, expected ${version}"
                exit 1
              fi
              sleep 15
            done
          done

  publish-facade:
    name: Publish lib_llama_cpp
    runs-on: ubuntu-latest
    needs:
      - wait-for-foundation
      - wait-for-platforms
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_REF }}

      - name: Setup Dart OIDC credentials
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Publish lib_llama_cpp
        working-directory: packages/lib_llama_cpp
        env:
          PACKAGE: lib_llama_cpp
        run: |
          set -euo pipefail
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          published="$(
            curl -fsSL "https://pub.dev/api/packages/${PACKAGE}" |
              VERSION="$version" python3 -c 'import json, os, sys; print("yes" if any(item["version"] == os.environ["VERSION"] for item in json.load(sys.stdin).get("versions", [])) else "no")'
          )"
          if [[ "$published" == "yes" ]]; then
            echo "${PACKAGE} ${version} is already published; skipping"
            exit 0
          fi
          if ! flutter pub publish --force 2>&1 | tee publish.log; then
            if grep -Eiq 'already (published|exists)|version .* already' publish.log; then
              echo "${PACKAGE} ${version} is already published; treating as success"
              exit 0
            fi
            exit 1
          fi
