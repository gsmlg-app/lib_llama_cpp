name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 1.2.3)
        required: true
        type: string
      git_ref:
        description: Git ref to release from
        required: true
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-gate:
    name: E2E release gate
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Check e2e dispatch token
        env:
          PUBLISH_WORKFLOW_TOKEN: ${{ secrets.PUBLISH_WORKFLOW_TOKEN }}
        run: |
          if [[ -z "$PUBLISH_WORKFLOW_TOKEN" ]]; then
            echo "::error::Set the PUBLISH_WORKFLOW_TOKEN secret so release can verify or dispatch the e2e workflow."
            exit 1
          fi

      - name: Ensure e2e passed for release ref
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_WORKFLOW_TOKEN }}
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          existing_run="$(
            gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow e2e.yml \
              --json databaseId,headSha,status,conclusion,url,createdAt \
              --limit 100 \
              --jq '
                [ .[]
                  | select(.headSha == "'"${target_sha}"'")
                  | select(.status == "completed")
                  | select(.conclusion == "success")
                ]
                | sort_by(.createdAt)
                | reverse
                | .[0].url // empty
              '
          )"
          if [[ -n "$existing_run" ]]; then
            echo "Found successful e2e run for ${target_sha}: ${existing_run}"
            exit 0
          fi

          start_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run e2e.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "$GIT_REF" \
            -f platform=all

          run_id=""
          for attempt in {1..40}; do
            run_id="$(
              gh run list \
                --repo "${GITHUB_REPOSITORY}" \
                --workflow e2e.yml \
                --json databaseId,headSha,url,createdAt \
                --limit 100 \
                --jq '
                  [ .[]
                    | select(.headSha == "'"${target_sha}"'")
                    | select(.createdAt >= "'"${start_time}"'")
                  ]
                  | sort_by(.createdAt)
                  | reverse
                  | .[0].databaseId // empty
                '
            )"
            if [[ -n "$run_id" ]]; then
              break
            fi
            sleep 15
          done
          if [[ -z "$run_id" ]]; then
            echo "::error::Could not find dispatched e2e workflow run for ${target_sha}."
            exit 1
          fi
          gh run watch "$run_id" \
            --repo "${GITHUB_REPOSITORY}" \
            --exit-status \
            --interval 30

  native-prebuilt-linux:
    name: Native prebuilt (linux)
    needs:
      - e2e-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build glslc libvulkan-dev spirv-headers

      - name: Build Linux prebuilt library
        env:
          LIB_LLAMA_CPP_ENABLE_VULKAN: ON
        run: .github/scripts/build-native-prebuilt.sh linux "$RUNNER_TEMP/prebuilt"

      - name: Upload Linux prebuilt library
        uses: actions/upload-artifact@v4
        with:
          name: lib-llama-cpp-prebuilt-linux-${{ inputs.version }}
          path: ${{ runner.temp }}/prebuilt
          if-no-files-found: error

  native-prebuilt-android:
    name: Native prebuilt (android)
    needs:
      - e2e-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Android native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build glslc libvulkan-dev spirv-headers

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "cmake;3.22.1" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Build Android prebuilt libraries
        env:
          LIB_LLAMA_CPP_ENABLE_VULKAN: ON
        run: .github/scripts/build-native-prebuilt.sh android "$RUNNER_TEMP/prebuilt"

      - name: Upload Android prebuilt libraries
        uses: actions/upload-artifact@v4
        with:
          name: lib-llama-cpp-prebuilt-android-${{ inputs.version }}
          path: ${{ runner.temp }}/prebuilt
          if-no-files-found: error

  native-prebuilt-apple:
    name: Native prebuilt (apple)
    needs:
      - e2e-gate
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Apple native build dependencies
        run: brew install cmake ninja

      - name: Build macOS prebuilt framework
        run: .github/scripts/build-native-prebuilt.sh macos "$RUNNER_TEMP/prebuilt"

      - name: Build iOS prebuilt framework
        run: .github/scripts/build-native-prebuilt.sh ios "$RUNNER_TEMP/prebuilt"

      - name: Upload Apple prebuilt frameworks
        uses: actions/upload-artifact@v4
        with:
          name: lib-llama-cpp-prebuilt-apple-${{ inputs.version }}
          path: ${{ runner.temp }}/prebuilt
          if-no-files-found: error

  native-prebuilt-windows:
    name: Native prebuilt (windows)
    needs:
      - e2e-gate
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2.0
        with:
          version: latest
          cache: true

      - name: Build Windows prebuilt library
        shell: pwsh
        env:
          LIB_LLAMA_CPP_ENABLE_VULKAN: ON
        run: .github/scripts/build-native-prebuilt.ps1 -Platform windows -OutputDir "$env:RUNNER_TEMP\prebuilt"

      - name: Upload Windows prebuilt library
        uses: actions/upload-artifact@v4
        with:
          name: lib-llama-cpp-prebuilt-windows-${{ inputs.version }}
          path: ${{ runner.temp }}/prebuilt
          if-no-files-found: error

  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - native-prebuilt-linux
      - native-prebuilt-android
      - native-prebuilt-apple
      - native-prebuilt-windows
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev liblzma-dev ninja-build pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check publish trigger token
        env:
          PUBLISH_WORKFLOW_TOKEN: ${{ secrets.PUBLISH_WORKFLOW_TOKEN }}
        run: |
          if [[ -z "$PUBLISH_WORKFLOW_TOKEN" ]]; then
            echo "::error::Set the PUBLISH_WORKFLOW_TOKEN secret to a token that can create releases and trigger workflows."
            exit 1
          fi

      - name: Update package versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          dart pub get
          for pubspec in packages/*/pubspec.yaml; do
            perl -0pi -e 's/^version: .+$/version: $ENV{VERSION}/m' "$pubspec"
            perl -0pi -e 's/^(\s+(?:lib_llama_cpp_android|lib_llama_cpp_ffi|lib_llama_cpp_ios|lib_llama_cpp_linux|lib_llama_cpp_macos|lib_llama_cpp_platform_interface|lib_llama_cpp_windows): )\^?[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$/${1}^$ENV{VERSION}/mg' "$pubspec"
          done
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          for podspec in (
              Path("packages/lib_llama_cpp_ios/ios/lib_llama_cpp_ios.podspec"),
              Path("packages/lib_llama_cpp_macos/macos/lib_llama_cpp_macos.podspec"),
          ):
              text = podspec.read_text()
              text = re.sub(
                  r"(s\.version\s*=\s*['\"])[^'\"]+(['\"])",
                  rf"\g<1>{version}\2",
                  text,
                  count=1,
              )
              podspec.write_text(text)
          PY
          if [[ "$VERSION" == *+* ]]; then
            EXAMPLE_VERSION="$VERSION"
          else
            EXAMPLE_VERSION="${VERSION}+1"
          fi
          export EXAMPLE_VERSION
          perl -0pi -e 's/^version: .+$/version: $ENV{EXAMPLE_VERSION}/m' example/pubspec.yaml

      - name: Install updated dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze .

      - name: Run pure Dart tests
        run: dart test packages/lib_llama_cpp_platform_interface/test && dart test packages/lib_llama_cpp_ffi/test

      - name: Run Flutter tests
        run: >
          flutter test
          packages/lib_llama_cpp/test
          packages/lib_llama_cpp_android/test
          packages/lib_llama_cpp_ios/test
          packages/lib_llama_cpp_macos/test
          packages/lib_llama_cpp_linux/test
          packages/lib_llama_cpp_windows/test
          example/test

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux example app
        working-directory: example
        run: flutter build linux --release

      - name: Download native prebuilts
        uses: actions/download-artifact@v4
        with:
          pattern: lib-llama-cpp-prebuilt-*-${{ inputs.version }}
          path: dist/prebuilt
          merge-multiple: true

      - name: Install prebuilts into publish packages
        run: .github/scripts/install-prebuilt-packages.sh dist/prebuilt

      - name: Validate pub package archives
        run: |
          set -euo pipefail
          for package_dir in packages/*; do
            if [[ -f "$package_dir/pubspec.yaml" ]]; then
              echo "::group::flutter pub publish --dry-run ($package_dir)"
              (cd "$package_dir" && flutter pub publish --dry-run --ignore-warnings)
              echo "::endgroup::"
            fi
          done

      - name: Validate pub package sizes
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import sys

          limit = 100 * 1024 * 1024
          failed = False
          for package_dir in sorted(Path("packages").iterdir()):
              if not (package_dir / "pubspec.yaml").is_file():
                  continue
              total = sum(
                  path.stat().st_size
                  for path in package_dir.rglob("*")
                  if path.is_file()
              )
              print(f"{package_dir.name}: {total / 1024 / 1024:.1f} MiB")
              if total >= limit:
                  print(
                      f"::error::{package_dir.name} is {total} bytes, "
                      f"which exceeds pub.dev's {limit} byte package scan limit."
                  )
                  failed = True
          if failed:
              sys.exit(1)
          PY

      - name: Create release artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p dist/release
          tar -czf "dist/release/lib_llama_cpp-prebuilt-${VERSION}.tar.gz" \
            -C dist/prebuilt \
            .
          (
            cd dist/release
            sha256sum "lib_llama_cpp-prebuilt-${VERSION}.tar.gz" \
              > "lib_llama_cpp-prebuilt-${VERSION}.tar.gz.sha256"
          )
          tar -czf "dist/release/lib_llama_cpp-source-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.dart_tool' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='example/build' \
            --exclude='packages/lib_llama_cpp_android/android/src/main/jniLibs' \
            --exclude='packages/lib_llama_cpp_ios/ios/Frameworks' \
            --exclude='packages/lib_llama_cpp_linux/linux/prebuilt' \
            --exclude='packages/lib_llama_cpp_macos/macos/Frameworks' \
            --exclude='packages/lib_llama_cpp_windows/windows/prebuilt' \
            .
          tar -czf "dist/release/lib_llama_cpp_example-linux-${VERSION}.tar.gz" \
            -C example/build/linux/x64/release/bundle \
            .

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add \
            packages/*/pubspec.yaml \
            packages/lib_llama_cpp_ios/ios/lib_llama_cpp_ios.podspec \
            packages/lib_llama_cpp_macos/macos/lib_llama_cpp_macos.podspec \
            example/pubspec.yaml
          if git diff --cached --quiet; then
            echo "Package versions are already set to v${VERSION}."
          else
            git commit -m "chore(release): v${VERSION}"
          fi
          git push origin "HEAD:${{ inputs.git_ref }}"

      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_WORKFLOW_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v${VERSION}" dist/release/* \
            --target "$(git rev-parse HEAD)" \
            --generate-notes \
            --title "v${VERSION}"

      - name: Dispatch pub.dev publish
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_WORKFLOW_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh workflow run publish.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "v${VERSION}" \
            -f version="${VERSION}" \
            -f git_ref="v${VERSION}"
