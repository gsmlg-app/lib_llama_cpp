name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 1.2.3)
        required: true
        type: string
      git_ref:
        description: Git ref to release from
        required: true
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev liblzma-dev ninja-build pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check publish trigger token
        env:
          PUBLISH_WORKFLOW_TOKEN: ${{ secrets.PUBLISH_WORKFLOW_TOKEN }}
        run: |
          if [[ -z "$PUBLISH_WORKFLOW_TOKEN" ]]; then
            echo "::error::Set the PUBLISH_WORKFLOW_TOKEN secret to a token that can push tags and trigger workflows."
            exit 1
          fi

      - name: Update package versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          dart pub get
          for pubspec in packages/*/pubspec.yaml; do
            perl -0pi -e 's/^version: .+$/version: $ENV{VERSION}/m' "$pubspec"
            perl -0pi -e 's/^(\s+(?:lib_llama_cpp_android|lib_llama_cpp_ffi|lib_llama_cpp_ios|lib_llama_cpp_linux|lib_llama_cpp_macos|lib_llama_cpp_platform_interface|lib_llama_cpp_windows): )\^?[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$/${1}^$ENV{VERSION}/mg' "$pubspec"
          done
          if [[ "$VERSION" == *+* ]]; then
            EXAMPLE_VERSION="$VERSION"
          else
            EXAMPLE_VERSION="${VERSION}+1"
          fi
          export EXAMPLE_VERSION
          perl -0pi -e 's/^version: .+$/version: $ENV{EXAMPLE_VERSION}/m' example/pubspec.yaml

      - name: Install updated dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze .

      - name: Run pure Dart tests
        run: dart test packages/lib_llama_cpp_platform_interface/test && dart test packages/lib_llama_cpp_ffi/test

      - name: Run Flutter tests
        run: >
          flutter test
          packages/lib_llama_cpp/test
          packages/lib_llama_cpp_android/test
          packages/lib_llama_cpp_ios/test
          packages/lib_llama_cpp_macos/test
          packages/lib_llama_cpp_linux/test
          packages/lib_llama_cpp_windows/test
          example/test

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux example app
        working-directory: example
        run: flutter build linux --release

      - name: Create release artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p dist
          tar -czf "dist/lib_llama_cpp-source-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.dart_tool' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='example/build' \
            .
          tar -czf "dist/lib_llama_cpp_example-linux-${VERSION}.tar.gz" \
            -C example/build/linux/x64/release/bundle \
            .

      - name: Commit version bump and tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add packages/*/pubspec.yaml example/pubspec.yaml
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin "HEAD:${{ inputs.git_ref }}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v${VERSION}" dist/* \
            --generate-notes \
            --title "v${VERSION}"

      - name: Trigger pub.dev publish
        env:
          PUBLISH_WORKFLOW_TOKEN: ${{ secrets.PUBLISH_WORKFLOW_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "$PUBLISH_WORKFLOW_TOKEN" ]]; then
            echo "::error::Set the PUBLISH_WORKFLOW_TOKEN secret to a token that can push tags and trigger workflows."
            exit 1
          fi
          publish_tag="pub-v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${publish_tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${publish_tag} already exists."
            exit 1
          fi
          git tag "$publish_tag"
          git config --unset-all http.https://github.com/.extraheader || true
          git push "https://x-access-token:${PUBLISH_WORKFLOW_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$publish_tag"
